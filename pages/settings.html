<div class="settings-page">
    <h2 style="margin-bottom: 20px;">Settings</h2>
    
    <div class="glass" style="padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; margin-bottom: 15px;">
        <span>Dark Mode</span>
        <input type="checkbox" id="setting-theme" style="width: auto; margin:0;" onchange="document.getElementById('theme-toggle').click()">
    </div>

    <div class="glass" style="padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; margin-bottom: 15px;">
        <span>Push Notifications</span>
        <input type="checkbox" checked style="width: auto; margin:0;">
    </div>

    <div class="glass" style="padding: 15px; border-radius: 15px; margin-bottom: 15px;">
        <h4>About AIStack Pro</h4>
        <p style="font-size: 12px; margin-top: 5px;">Version 1.0.0<br>Designed for maximum productivity.</p>
    </div>
</div>
